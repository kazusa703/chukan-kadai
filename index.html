<!doctype html>
<html lang="ja">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width,initial-scale=1.0">
		<title>日本のどこで学ぶ？ 留学生マップ（中間プロトタイプ）</title>
		<link rel="stylesheet" href="./css/style.css">
	</head>
	<body>

		<!-- タイトル -->
		<h1>日本のどこで学ぶ？ ―留学生の都道府県マップ</h1>

		<!-- メイン：都道府県別ヒートマップ -->
		<div class="section">
			<h2>都道府県別 留学生数（色が濃いほど多い）</h2>

			<!-- 凡例：色の意味 -->
			<div class="legend">
				<div class="legend-item"><div class="legend-color legend-1"></div>1,000人未満</div>
				<div class="legend-item"><div class="legend-color legend-2"></div>1,000〜4,999人</div>
				<div class="legend-item"><div class="legend-color legend-3"></div>5,000〜9,999人</div>
				<div class="legend-item"><div class="legend-color legend-4"></div>10,000〜49,999人</div>
				<div class="legend-item"><div class="legend-color legend-5"></div>50,000人以上</div>
			</div>

			<!-- ここに JavaScript が47都道府県のタイルを入れます -->
			<div class="map" id="pref-map"></div>
		</div>

		<!-- スクリプト読み込み：data.js → main.js の順 -->
		<script src="./js/data.js"></script>
		<script src="./js/main.js"></script>
	</body>
</html>
